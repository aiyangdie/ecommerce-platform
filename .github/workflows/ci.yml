name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven
      - name: Build mall-api
        working-directory: mall-api
        run: mvn -B -DskipTests package

  frontend-admin:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install & build mall-admin
        working-directory: mall-admin
        run: |
          npm install
          npm run build
      - uses: actions/upload-artifact@v4
        with:
          name: admin-dist
          path: mall-admin/dist
