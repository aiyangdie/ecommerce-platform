name: Deploy Admin to GitHub Pages

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Build admin for GitHub Pages
        working-directory: mall-admin
        env:
          GITHUB_ACTIONS: true
          # 演示 API：部署后可在仓库 Variables 覆盖
          VITE_API_BASE_URL: ${{ vars.VITE_API_BASE_URL || '' }}
        run: |
          npm install
          npm run build
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: mall-admin/dist
      - id: deployment
        uses: actions/deploy-pages@v4
