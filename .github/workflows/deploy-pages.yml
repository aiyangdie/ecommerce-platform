name: Deploy Online (GitHub Pages)

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build mall-admin (online demo mode)
        working-directory: mall-admin
        env:
          GITHUB_ACTIONS: true
          VITE_DEMO_MODE: 'true'
          VITE_API_BASE_URL: ${{ vars.VITE_API_BASE_URL || '' }}
        run: |
          npm install
          npm run build

      - name: Assemble site (landing + admin)
        run: |
          mkdir -p _site/admin
          cp -r docs/index.html docs/.nojekyll _site/
          cp -r mall-admin/dist/* _site/admin/

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - id: deployment
        uses: actions/deploy-pages@v4
