spring:
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:default}

---
server:
  port: ${API_PORT:8080}

spring:
  application:
    name: mall-api
  datasource:
    url: jdbc:mysql://${MYSQL_HOST:127.0.0.1}:${MYSQL_PORT:3306}/${MYSQL_DATABASE:mall}?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: ${MYSQL_USER:mall}
    password: ${MYSQL_PASSWORD:mall_pass_2026}
    driver-class-name: com.mysql.cj.jdbc.Driver
  data:
    redis:
      host: ${REDIS_HOST:127.0.0.1}
      port: ${REDIS_PORT:6379}

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      id-type: auto

mall:
  jwt:
    secret: ${JWT_SECRET:mall-open-source-jwt-secret-change-in-production}
    expire-hours: 168

springdoc:
  swagger-ui:
    path: /swagger-ui.html

knife4j:
  enable: true
  setting:
    language: zh_cn

---
spring:
  config:
    activate:
      on-profile: docker
